{% extends "layout.html" %}

{% block title %}Inventario{% endblock %}

{% block body %}
<div class="bg-white p-4 rounded">

    <h2 class="text-center mb-5 fw-bold">Registrar Nuevo Inmueble</h2>

    <form id="inventario-form">
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <label for="id-inventario" class="form-label fw-bold">Código de Inventario</label>
                <input type="text" class="form-control" id="id-inventario" placeholder="Ej: 1519847">
            </div>
            <div class="col-md-3">
                <label for="id-esbye" class="form-label fw-bold">Código ESBYE</label>
                <input type="text" class="form-control" id="id-esbye" placeholder="Ej: 35344704">
            </div>
            <div class="col-md-3">
                <label for="cuenta" class="form-label fw-bold">Cuenta</label>
                <select id="cuenta" class="form-select text-muted">
                    <option value="" selected disabled>Seleccione una opción</option>
                    <option value="1">Cuenta 1</option>
                    <option value="2">Cuenta 2</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="cantidad" class="form-label fw-bold">Cantidad</label>
                <input type="number" class="form-control" id="cantidad" placeholder="1" min="1">
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <label for="descripcion-1" class="form-label fw-bold">Descripción</label>
                <input type="text" class="form-control" id="descripcion-1" placeholder="Descripción del bien">
            </div>
            <div class="col-md-3">
                <label for="marca" class="form-label fw-bold">Marca</label>
                <input type="text" class="form-control" id="marca" placeholder="Ej: RUCKUS">
            </div>
            <div class="col-md-3">
                <label for="modelo" class="form-label fw-bold">Modelo</label>
                <input type="text" class="form-control" id="modelo" placeholder="Ej: R320">
            </div>
            <div class="col-md-3">
                <label for="serie" class="form-label fw-bold">Serie</label>
                <input type="text" class="form-control" id="serie" placeholder="Ej: 6463727474">
            </div>
            <div class="col-md-3">
                <label for="estado" class="form-label fw-bold">Estado</label>
                <select id="estado" class="form-select text-muted">
                    <option value="" selected disabled>Seleccione una opción</option>
                    <option value="bueno">Bueno</option>
                    <option value="regular">Regular</option>
                    <option value="malo">Malo</option>
                </select>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <label for="ubicacion" class="form-label fw-bold">Ubicación</label>
                <input type="text" class="form-control" id="ubicacion" placeholder="Ej: AUDITORIO GORKI HIDEYO ...">
            </div>
            <div class="col-md-3">
                <label for="fecha" class="form-label fw-bold">Fecha de Adquisición</label>
                <input type="date" class="form-control text-muted" id="fecha">
            </div>
            <div class="col-md-3">
                <label for="valor" class="form-label fw-bold">Valor</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="valor" placeholder="1" min="0" step="0.01">
                </div>
            </div>
            <div class="col-md-3">
                <label for="usuario" class="form-label fw-bold">Usuario Final</label>
                <select id="usuario" class="form-select text-muted">
                    <option value="" selected disabled>Seleccione personal</option>
                </select>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-12">
                <label for="observacion" class="form-label fw-bold">Observación</label>
                <textarea class="form-control" id="observacion" rows="3" placeholder="Observaciones"></textarea>
            </div>
        </div>

        <hr class="my-5 opacity-25">
        <h3 class="text-center mb-5 fw-bold text-uppercase">Sistema de Bienes y Existencias ESBYE</h3>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <label for="descripcion-2" class="form-label fw-bold">Descripción</label>
                <input type="text" class="form-control" id="descripcion-2" placeholder="Descripción ESBYE">
            </div>
            <div class="col-md-3">
                <label for="marca-2" class="form-label fw-bold">Marca</label>
                <input type="text" class="form-control" id="marca-2" placeholder="Ej: RUCKUS">
            </div>
            <div class="col-md-3">
                <label for="modelo-2" class="form-label fw-bold">Modelo</label>
                <input type="text" class="form-control" id="modelo-2" placeholder="Ej: R320">
            </div>
            <div class="col-md-3">
                <label for="serie-2" class="form-label fw-bold">Serie</label>
                <input type="text" class="form-control" id="serie-2" placeholder="Ej: 6463727474">
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <label for="fecha-2" class="form-label fw-bold">Fecha</label>
                <input type="date" class="form-control text-muted" id="fecha-2">
            </div>
            <div class="col-md-3">
                <label for="valor-2" class="form-label fw-bold">Valor</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="valor-2" placeholder="1" min="0" step="0.01">
                </div>
            </div>
            <div class="col-md-3">
                <label for="ubicacion-2" class="form-label fw-bold">Ubicación</label>
                <input type="text" class="form-control" id="ubicacion-2" placeholder="Ej: AUDITORIO GORKI HIDEYO ...">
            </div>
            <div class="col-md-3">
                <label for="observacion-2" class="form-label fw-bold">Observación</label>
                <input type="text" class="form-control" id="observacion-2" placeholder="Observación ESBYE">
            </div>
        </div>

        <div class="row mt-5">
            <div class="row">
                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-primary px-5 btn-lg">Registrar Inmueble</button>
                </div>
                <div class="col-12 text-center mt-3">
                    <button type="button" class="btn btn-outline-primary px-5" onclick="window.print()">Listado de inventario</button>
                </div>
            </div>
        </div>

    </form>

</div>

<div class="row footer-stats text-uppercase small fw-bold text-muted" style="margin-top: 20px; margin-bottom: 20px;">
    <div class="text-end text-capitalize opacity-50">
        © {{ data.year }} Universidad de Guayaquil <br>Sistema de inventarios
    </div>
</div>

<script src="{{ url_for('static', filename='js/formulario-inventario.js') }}"></script>
{% endblock %}
