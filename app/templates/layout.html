<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=1.1) }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-1">
        <div class="container p-2">
            <a class="navbar-brand fw-bold text-primary" href="{{ url_for('index') }}">
                <img class="img-fluid" style="height: 3rem;"
                    src="https://www.ug.edu.ec/wp-content/uploads/2023/05/cropped-ug-color-horizontal-1.png" alt="Logo">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Mostrar navegación">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
                            {% if request.endpoint == 'index' %}aria-current="page"{% endif %}
                            href="{{ url_for('index') }}">Inicio</a>
                    </li>
                    <li class="nav-item"><a class="nav-link {% if request.endpoint == 'informe' %}active{% endif %}"
                        {% if request.endpoint == 'informe' %}aria-current="page"{% endif %}
                        href="{{ url_for('informe') }}">Generar Actas</a></li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'inventario_list' %}active{% endif %}"
                            {% if request.endpoint == 'inventario_list' %}aria-current="page"{% endif %}
                            href="{{ url_for('inventario_list') }}">Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'ajustes' %}active{% endif %}"
                            {% if request.endpoint == 'ajustes' %}aria-current="page"{% endif %}
                            href="{{ url_for('ajustes') }}">Configuración</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block body %}

        {% endblock %}
    </div>

    <!-- Modal de Notificación Global -->
    <div class="modal fade" id="modalGlobalNotificacion" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="modalGlobalNotificacionLabel" aria-hidden="true" style="z-index: 1080;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header text-white" id="modalGlobalNotificacionHeader">
                    <h5 class="modal-title fw-semibold" id="modalGlobalNotificacionLabel">Notificación</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body fs-5 text-center py-4" id="modalGlobalNotificacionBody">
                    <!-- Mensaje dinámico -->
                </div>
                <div class="modal-footer bg-light justify-content-center">
                    <button type="button" class="btn px-4" id="modalGlobalNotificacionBtn" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/modales.js') }}"></script>
</body>

</html>
